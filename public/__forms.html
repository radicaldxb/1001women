<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>1001 Women form detection</title>
  </head>
  <body>
    <!-- Netlify parses this static file at build time so React forms can submit. -->
    <form name="join" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="role" />
      <input type="text" name="source" />
    </form>
    <form name="preorder" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="interest" />
      <input type="text" name="region" />
      <input type="text" name="source" />
    </form>
  </body>
</html>
